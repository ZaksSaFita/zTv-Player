name: ztv_player
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter


  dio: ^5.7.0
  path_provider: ^2.1.4
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  json_annotation: ^4.9.0
  media_kit: ^1.2.6
  media_kit_video: ^1.3.0
  media_kit_libs_video: ^1.0.5
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/zTv_logo.png"

flutter:
  uses-material-design: true

